version: "3.9"
services:
  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: monorg/monapp:1.0.0   # remplace par ton nom d’image taggé
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////data/app.db   # si tu l’utilises dans ton code
      - SECRET_KEY=${SECRET_KEY}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - FERNET_KEY=${FERNET_KEY}              # base64 Fernet key, cf. CLAUDE.md
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}    # fallback si aucun OpenAIConfig actif
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
    volumes:
      - app_data:/data
    networks: [web]
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  backup:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
    volumes:
      - app_data:/data:ro
      - ./backups:/backups
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    entrypoint: ["/bin/sh","-c"]
    command: >
      'apk add --no-cache sqlite openssl 2>/dev/null;
       while true; do
         TS=$(date +%F_%H-%M-%S);
         TMP=/tmp/app_${TS}.sqlite;
         sqlite3 /data/app.db ".backup ${TMP}";
         if [ -n "$BACKUP_ENCRYPTION_KEY" ]; then
           openssl enc -aes-256-cbc -pbkdf2 -pass env:BACKUP_ENCRYPTION_KEY \
             -in ${TMP} -out /backups/app_${TS}.sqlite.enc;
           rm -f ${TMP};
           chmod 600 /backups/app_${TS}.sqlite.enc;
           find /backups -type f -name "app_*.sqlite.enc" -mtime +14 -delete;
         else
           mv ${TMP} /backups/app_${TS}.sqlite;
           chmod 600 /backups/app_${TS}.sqlite;
           find /backups -type f -name "app_*.sqlite" -mtime +14 -delete;
         fi;
         sleep 86400;
       done'

volumes:
  caddy_data:
  caddy_config:
  app_data:

networks:
  web:
    driver: bridge
