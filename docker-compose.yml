version: "3.9"
services:
  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: monorg/monapp:1.0.0   # remplace par ton nom d’image taggé
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////data/app.db   # si tu l’utilises dans ton code
    volumes:
      - app_data:/data
    networks: [web]
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  backup:
    image: alpine:3.20
    restart: unless-stopped
    volumes:
      - app_data:/data:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh","-c"]
    command: >
      'while true; do
         TS=$(date +%F_%H-%M-%S);
         sqlite3 /data/app.db ".backup /backups/app_${TS}.sqlite";
         find /backups -type f -name "app_*.sqlite" -mtime +14 -delete;
         sleep 86400;
       done'

volumes:
  caddy_data:
  caddy_config:
  app_data:

networks:
  web:
    driver: bridge
