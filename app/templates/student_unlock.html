{% extends 'base.html' %}
{% block title %}Déverrouiller le profil{% endblock %}
{% block content %}
  <div class="card unlock-card">
    <div class="student-avatar-large">
      <img src="{{ url_for('static', filename=student.avatar_url()) }}" alt="Avatar de {{ student.full_name() }}" />
    </div>
    <h2>Bonjour {{ student.first_name }} !</h2>
    <p class="muted">Entre ton code PIN à 4 chiffres pour accéder à ton espace.</p>
    <form method="post" class="unlock-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input
        name="pin"
        type="password"
        pattern="\d{4}"
        maxlength="4"
        inputmode="numeric"
        required
        placeholder="••••"
        class="pin-input"
        autofocus
      />
      <button class="btn btn-primary" type="submit">Déverrouiller</button>
      <a class="btn btn-secondary" href="{{ url_for('main.index') }}">Retour</a>
    </form>
  </div>
{% endblock %}
