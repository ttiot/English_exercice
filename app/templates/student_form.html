{% extends 'base.html' %}
{% block title %}Créer un profil élève{% endblock %}
{% block content %}
  <div class="card">
    <h2>Créer un nouveau profil élève</h2>
    <p>Ajoute une photo et un mot de passe pour sécuriser l'accès.</p>
    <form method="post" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <label for="first_name">Prénom *</label>
      <input id="first_name" name="first_name" required placeholder="Ex. Léa" value="{{ form_data.get('first_name', '') }}" />

      <label for="last_name">Nom</label>
      <input id="last_name" name="last_name" placeholder="Ex. Martin" value="{{ form_data.get('last_name', '') }}" />

      <label for="email">Adresse e-mail *</label>
      <input id="email" name="email" type="email" required placeholder="exemple@ecole.fr" value="{{ form_data.get('email', '') }}" />

      <label for="avatar">Photo de profil</label>
      <input id="avatar" name="avatar" type="file" accept="image/*" />

      <label for="age">Âge</label>
      <input id="age" name="age" type="number" min="6" max="13" placeholder="10" value="{{ form_data.get('age', '') }}" />

      <label for="goals">Objectifs</label>
      <textarea id="goals" name="goals" rows="3" placeholder="Ex. Réviser les nombres, travailler le vocabulaire...">{{ form_data.get('goals', '') }}</textarea>

      <label for="target_cefr_level">Niveau CECRL cible</label>
      <select id="target_cefr_level" name="target_cefr_level">
        <option value="">Choisir</option>
        {% for level in cefr_levels %}
          <option value="{{ level }}" {% if form_data.get('target_cefr_level') == level %}selected{% endif %}>{{ level }}</option>
        {% endfor %}
      </select>

      <div class="grid-two">
        <div>
          <label for="target_grade">Niveau scolaire</label>
          <select id="target_grade" name="target_grade">
            <option value="">Choisir</option>
            {% for grade in grade_levels %}
              <option value="{{ grade }}" {% if form_data.get('target_grade') == grade %}selected{% endif %}>{{ grade }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="target_trimester">Trimestre</label>
          <select id="target_trimester" name="target_trimester">
            <option value="">Choisir</option>
            {% for trimester in trimester_choices %}
              <option value="{{ trimester }}" {% if form_data.get('target_trimester')|string == trimester|string %}selected{% endif %}>{{ trimester }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <label>Domaines prioritaires</label>
      <div class="checkbox-group">
        {% for code, label in domain_choices %}
          <label class="checkbox-inline">
            <input type="checkbox" name="preferred_domains" value="{{ code }}" {% if code in selected_domains %}checked{% endif %} />
            {{ label }}
          </label>
        {% endfor %}
      </div>

      <label for="interests">Centres d'intérêt</label>
      <textarea id="interests" name="interests" rows="2" placeholder="Ex. Sport, musique, jeux vidéo...">{{ form_data.get('interests', '') }}</textarea>

      <div class="grid-two">
        <div>
          <label for="password">Mot de passe *</label>
          <input id="password" name="password" type="password" minlength="8" required placeholder="Au moins 8 caractères" />
        </div>
        <div>
          <label for="password_confirm">Confirmer *</label>
          <input
            id="password_confirm"
            name="password_confirm"
            type="password"
            minlength="8"
            required
            placeholder="Répéter le mot de passe"
          />
        </div>
      </div>

      <button class="btn btn-primary" type="submit">Créer le profil</button>
      <a class="btn btn-secondary" href="{{ url_for('main.index') }}">Annuler</a>
    </form>
  </div>
{% endblock %}
