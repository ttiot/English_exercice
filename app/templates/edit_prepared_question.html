{% extends 'base.html' %}
{% block title %}Modifier la question préparée{% endblock %}
{% block content %}

<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
    <h2 style="margin:0;">Modifier la question préparée</h2>
    <a class="btn btn-secondary" href="{{ url_for('parents.list_all_exercises') }}">← Retour aux exercices</a>
  </div>

  {% if question.exercise_set %}
  <div style="background:var(--surface-2,#1e2030); border-radius:8px; padding:0.75rem 1rem; margin-bottom:1.5rem;">
    <p class="muted" style="margin:0 0 0.2rem; font-size:0.8rem;">Série</p>
    <p style="margin:0; font-weight:600;">{{ question.exercise_set.title | e }}</p>
  </div>
  {% endif %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div style="margin-bottom:1.25rem;">
      <label for="prompt" style="display:block; margin-bottom:0.4rem; font-weight:600;">Question</label>
      <textarea
        id="prompt"
        name="prompt"
        rows="4"
        maxlength="1000"
        required
        style="width:100%;"
      >{{ (form_data.prompt if form_data else question.prompt) | e }}</textarea>
    </div>

    <div style="margin-bottom:1.25rem;">
      <label for="category" style="display:block; margin-bottom:0.4rem; font-weight:600;">Catégorie</label>
      <select id="category" name="category" style="width:100%; max-width:400px;">
        {% set current_cat = form_data.category if form_data else question.category_code %}
        {% for cat in categories %}
          <option value="{{ cat.code }}" {% if cat.code == current_cat %}selected{% endif %}>{{ cat.name | e }}</option>
        {% endfor %}
      </select>
    </div>

    <div style="margin-bottom:1.5rem;">
      <label for="answer" style="display:block; margin-bottom:0.4rem; font-weight:600;">Bonne réponse</label>
      <input
        type="text"
        id="answer"
        name="answer"
        maxlength="255"
        required
        value="{{ (form_data.answer if form_data else question.answer) | e }}"
        style="width:100%; max-width:400px;"
      />
    </div>

    <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
      <button type="submit" class="btn btn-primary">Enregistrer</button>
      <a class="btn btn-secondary" href="{{ url_for('parents.list_all_exercises') }}">Annuler</a>
    </div>
  </form>
</div>

{% endblock %}
