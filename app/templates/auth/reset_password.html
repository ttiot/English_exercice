{% extends 'base.html' %}
{% block title %}Nouveau mot de passe{% endblock %}
{% block content %}
  <div class="auth-page">
  <div class="card auth-card">
    <h2>Choisir un nouveau mot de passe</h2>
    <p class="muted">
      Ton mot de passe doit contenir au moins 12 caractères avec majuscules,
      minuscules, chiffres et caractères spéciaux.
    </p>
    <form method="post" action="{{ url_for('auth.reset_password', token=token) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="hidden" name="token" value="{{ token }}" />
      <label for="new_password">Nouveau mot de passe *</label>
      <input
        id="new_password"
        name="new_password"
        type="password"
        required
        autocomplete="new-password"
        minlength="12"
      />
      <label for="confirm_password">Confirmer le mot de passe *</label>
      <input
        id="confirm_password"
        name="confirm_password"
        type="password"
        required
        autocomplete="new-password"
        minlength="12"
      />
      <button class="btn btn-primary" type="submit">Réinitialiser le mot de passe</button>
    </form>
    <p class="muted" style="margin-top: 1rem;">
      <a href="{{ url_for('auth.login') }}">← Retour à la connexion</a>
    </p>
  </div>
  </div>
{% endblock %}
