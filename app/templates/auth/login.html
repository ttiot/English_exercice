{% extends 'base.html' %}
{% block title %}Connexion{% endblock %}
{% block content %}
  <div class="auth-page">
  <div class="card auth-card">
    <h2>Connexion</h2>
    <p class="muted">Entre ton e-mail et ton mot de passe pour accéder à l'application.</p>
    <form method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <label for="email">Adresse e-mail *</label>
      <input id="email" name="email" type="email" required autocomplete="email" />
      <label for="password">Mot de passe *</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />
      <p class="muted" style="margin: 0.4rem 0 0.8rem; text-align: right; font-size: 0.9em;">
        <a href="{{ url_for('auth.forgot_password') }}">Mot de passe oublié ?</a>
      </p>
      <button class="btn btn-primary" type="submit">Se connecter</button>
    </form>
    <p class="muted" style="margin-top: 1rem;">
      Pas encore de compte ? <a href="{{ url_for('auth.register') }}">Créer un compte élève</a>
    </p>
  </div>
  </div>
{% endblock %}
