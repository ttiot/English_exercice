{% extends 'base.html' %}
{% block title %}Créer un compte{% endblock %}
{% block content %}
  <div class="auth-page">
  <div class="card auth-card">
    <h2>Créer un compte élève</h2>
    <p class="muted">Remplis ce formulaire pour accéder aux exercices personnalisés.</p>
    <form method="post" enctype="multipart/form-data" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <label for="first_name">Prénom *</label>
      <input id="first_name" name="first_name" required placeholder="Ex. Léa" />
      <label for="last_name">Nom</label>
      <input id="last_name" name="last_name" placeholder="Ex. Martin" />
      <label for="email">Adresse e-mail *</label>
      <input id="email" name="email" type="email" required autocomplete="email" />
      <label for="avatar">Photo de profil</label>
      <input id="avatar" name="avatar" type="file" accept="image/*" />
      <label for="age">Âge</label>
      <input id="age" name="age" type="number" min="6" max="99" placeholder="10" />
      <label for="goals">Objectifs</label>
      <textarea id="goals" name="goals" rows="3" placeholder="Ex. Réviser les nombres, travailler le vocabulaire..."></textarea>
      <label for="password">Mot de passe *</label>
      <input id="password" name="password" type="password" minlength="8" required autocomplete="new-password" />
      <label for="password_confirm">Confirmer le mot de passe *</label>
      <input id="password_confirm" name="password_confirm" type="password" minlength="8" required autocomplete="new-password" />
      <button class="btn btn-primary" type="submit">Créer mon compte</button>
      <a class="btn btn-secondary" href="{{ url_for('auth.login') }}">J'ai déjà un compte</a>
    </form>
  </div>
  </div>
{% endblock %}
