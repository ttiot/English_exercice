{% extends 'base.html' %}
{% block title %}Mot de passe oublié{% endblock %}
{% block content %}
  <div class="auth-page">
  <div class="card auth-card">
    <h2>Mot de passe oublié</h2>
    <p class="muted">
      Saisis ton adresse e-mail. Si elle est associée à un compte, tu recevras
      un lien pour choisir un nouveau mot de passe (valable 1 heure).
    </p>
    <form method="post" action="{{ url_for('main.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <label for="email">Adresse e-mail *</label>
      <input id="email" name="email" type="email" required autocomplete="email" />
      <button class="btn btn-primary" type="submit">Envoyer le lien de réinitialisation</button>
    </form>
    <p class="muted" style="margin-top: 1rem;">
      <a href="{{ url_for('main.login') }}">← Retour à la connexion</a>
    </p>
  </div>
  </div>
{% endblock %}
