{% extends 'base.html' %}
{% block title %}Modifier l'exercice{% endblock %}
{% block content %}

<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
    <h2 style="margin:0;">Modifier l'exercice</h2>
    <a class="btn btn-secondary" href="{{ url_for('sessions.session_summary', session_id=session_obj.id) }}">← Retour à la correction</a>
  </div>

  {% if exercise.student_answer %}
  <div style="background:var(--surface-2,#1e2030); border-radius:8px; padding:1rem; margin-bottom:1.5rem;">
    <p class="muted" style="margin:0 0 0.25rem; font-size:0.85rem;">Réponse de l'élève (lecture seule)</p>
    <p style="margin:0; font-weight:600;">{{ exercise.student_answer }}</p>
  </div>
  {% endif %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div style="margin-bottom:1.25rem;">
      <label for="prompt" style="display:block; margin-bottom:0.4rem; font-weight:600;">Question</label>
      <textarea
        id="prompt"
        name="prompt"
        rows="4"
        maxlength="1000"
        required
        style="width:100%;"
      >{{ (form_data.prompt if form_data else exercise.prompt) | e }}</textarea>
    </div>

    <div style="margin-bottom:1.25rem;">
      <label for="category" style="display:block; margin-bottom:0.4rem; font-weight:600;">Catégorie</label>
      <select id="category" name="category" style="width:100%; max-width:400px;">
        {% set current_cat = form_data.category if form_data else exercise.category %}
        {% for cat in categories %}
          <option value="{{ cat.code }}" {% if cat.code == current_cat %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div style="margin-bottom:1.5rem;">
      <label for="correct_answer" style="display:block; margin-bottom:0.4rem; font-weight:600;">Bonne réponse</label>
      <input
        type="text"
        id="correct_answer"
        name="correct_answer"
        maxlength="255"
        required
        value="{{ (form_data.correct_answer if form_data else exercise.correct_answer) | e }}"
        style="width:100%; max-width:400px;"
      />
    </div>

    <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
      <button type="submit" class="btn btn-primary">Enregistrer</button>
      <a class="btn btn-secondary" href="{{ url_for('sessions.session_summary', session_id=session_obj.id) }}">Annuler</a>
    </div>
  </form>
</div>

{% endblock %}
